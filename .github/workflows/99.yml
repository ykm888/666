name: SL3000 Rescue Build (Only SPI-NOR)

on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]

jobs:
  build-rescue:
    runs-on: ubuntu-22.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout main repo (scripts + 888 三件套)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-repo

      - name: Checkout ImmortalWrt 24.10 (official)
        uses: actions/checkout@v4
        with:
          repository: immortalwrt/immortalwrt
          ref: openwrt-24.10
          path: source-repo

      - name: Generate release tag
        id: release_tag
        run: |
          TAG_NAME="v$(date -u +'%Y%m%d-%H%M%S')-rescue"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Release tag: $TAG_NAME"

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential clang flex bison gawk gettext git \
            libncurses-dev libssl-dev python3-distutils python3-setuptools \
            rsync unzip zlib1g-dev file wget \
            gcc-aarch64-linux-gnu device-tree-compiler

      - name: Optimize disk space
        run: |
          sudo apt clean
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
          df -h

      - name: Run diy-part1.sh (prepare tree)
        run: |
          chmod +x main-repo/diy-part1.sh
          cd main-repo
          ./diy-part1.sh

      - name: Run diy-part2.sh (build + package)
        run: |
          chmod +x main-repo/diy-part2.sh
          cd main-repo
          ./diy-part2.sh

      - name: List firmware files
        run: |
          echo "=== Rescue build output ==="
          ls -la output || true
          ls -la output/firmware || true
          ls -la output/atf || true
          ls -la output/uboot || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag_name }}
          name: "SL3000 Rescue Firmware ${{ steps.release_tag.outputs.tag_name }}"
          body: |
            ## SL3000 SPI-NOR 32MB 救砖全家桶（基于 ImmortalWrt 24.10）
            - 救砖固件（initramfs）
            - ATF / U-Boot 源码打包
          files: |
            output/firmware/*
            output/atf/*
            output/uboot/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sl3000-rescue-${{ steps.release_tag.outputs.tag_name }}
          path: output/
