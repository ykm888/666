name: SL3000 Rescue Build (Official Fix)

on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]

jobs:
  build-rescue:
    runs-on: ubuntu-22.04
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout main repo (Scripts + 888)
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-repo

      - name: Checkout ImmortalWrt 24.10
        uses: actions/checkout@v4
        with:
          repository: immortalwrt/immortalwrt
          ref: openwrt-24.10
          path: source-repo

      - name: Install Build Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison gawk gettext git \
            libncurses-dev libssl-dev python3-distutils python3-setuptools \
            rsync unzip zlib1g-dev file wget gcc-aarch64-linux-gnu device-tree-compiler
          sudo apt clean

      - name: Run diy-part1.sh (Inject & Patch)
        run: |
          chmod +x main-repo/diy-part1.sh
          # 核心修复：在根目录运行，以便访问两个仓库目录
          ./main-repo/diy-part1.sh

      - name: Run diy-part2.sh (Build Kernel & Rootfs)
        run: |
          # 从 part1 生成的标记文件中获取构建路径
          BUILD_DIR=$(cat build-dir.txt)
          chmod +x main-repo/diy-part2.sh
          ./main-repo/diy-part2.sh

      - name: Generate Release Tag
        id: release_tag
        run: echo "tag_name=SL3000-Rescue-$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create Release & Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag_name }}
          name: "SL3000 Rescue System ${{ steps.release_tag.outputs.tag_name }}"
          body: |
            ### SL3000 救砖专属固件 (SPI-NOR 启动)
            - **内核补丁**：已注入 `root=/dev/ram0` (内存运行模式)
            - **内存支持**：适配 1024M DDR4
            - **包含内容**：Initramfs Recovery ITB, ATF, U-Boot 源码包
          files: |
            output/firmware/*
            output/atf/*.tar.gz
            output/uboot/*.tar.gz

      - name: Upload Artifacts (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: sl3000-rescue-full
          path: output/
